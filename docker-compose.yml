# ============================================================
# ProjectAegis — Docker Compose (dev / deploy)
# ============================================================
# docker compose up -d --build
# ============================================================

services:
  # --- PostgreSQL + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Ollama LLM ---
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # --- Aegis Agent ---
  aegis:
    build: .
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      DATABASE_TYPE: postgres
      DATABASE_URL: postgresql://aegis:aegis_secret@postgres:5432/aegis
      VECTOR_STORE_TYPE: pgvector
      GUI_HOST: "0.0.0.0"
      GUI_PORT: "7860"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  pgdata:
  ollama_data:
